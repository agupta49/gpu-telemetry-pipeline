apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-streamer
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: streamer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streamer
    spec:
      containers:
      - name: streamer
        image: "{{ .Values.global.imagePrefix }}/streamer:latest"
        imagePullPolicy: IfNotPresent
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-streamer
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app.kubernetes.io/name: streamer
  ports:
  - port: 50051
    targetPort: 50051
