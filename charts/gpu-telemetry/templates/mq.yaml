apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-mq
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mq
    spec:
      containers:
      - name: mq
        image: "{{ .Values.global.imagePrefix }}/mq:latest"
        imagePullPolicy: IfNotPresent
