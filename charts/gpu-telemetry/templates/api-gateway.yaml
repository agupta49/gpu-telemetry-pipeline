apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: "{{ .Values.global.imagePrefix }}/api-gateway:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-telemetry.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.api-gateway.service.type }}
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: {{ .Values.api-gateway.service.nodePort }}
  selector:
    app.kubernetes.io/name: api-gateway
