openapi: 3.0.3
info:
  title: GPU Telemetry API
  version: 1.0.0
paths:
  /api/v1/gpus:
    get:
      summary: List GPUs
      responses:
        '200':
          description: OK
  /api/v1/gpus/{id}/telemetry:
    get:
      summary: Get telemetry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
